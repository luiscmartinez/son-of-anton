name: Codogotchi
options:
  bundleIdPrefix: com.codogotchi
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
targets:
  Codogotchi:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Fixtures/state-json
        type: folder
        buildPhase: resources
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Codogotchi
        CFBundleDisplayName: Codogotchi
        CFBundleIdentifier: com.codogotchi.app
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_NAME: Codogotchi
        PRODUCT_BUNDLE_IDENTIFIER: com.codogotchi.app
        GENERATE_INFOPLIST_FILE: NO
  CodogotchiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MenubarTests
    dependencies:
      - target: Codogotchi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codogotchi.app.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Codogotchi:
    build:
      targets:
        Codogotchi: all
        CodogotchiTests: [test]
    test:
      targets:
        - CodogotchiTests
    run:
      config: Debug
